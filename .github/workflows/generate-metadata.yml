name: Generate NFT Metadata

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        
      - name: Run Metadata Generator Script
        run: node generate.js

      - name: Commit and Push Metadata
        run: |
          git config --global user.name "darkpunksnft"
          git config --global user.email "darkpunksnft@users.noreply.github.com"
          
          git add metadata/
          git commit -m "Automated metadata generation from CSV" || echo "No changes to commit"
          git push origin main
